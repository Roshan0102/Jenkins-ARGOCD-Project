name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-test-sonar-docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and Test
        run: |

          cd java-maven-sonar-argocd-helm-k8s/spring-boot-app

          mvn clean package

      - name: SonarQube Scan
        run: |

          cd java-maven-sonar-argocd-helm-k8s/spring-boot-app

          mvn sonar:sonar \
          -Dsonar.projectKey=spring-boot-app \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |

          cd java-maven-sonar-argocd-helm-k8s/spring-boot-app

          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/ultimate-cicd:${{ github.run_number }} .

      - name: Push Docker Image
        run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/ultimate-cicd:${{ github.run_number }}

      - name: Clone Manifest Repository
        run: |

          git clone \
          https://${{ secrets.GH_PAT }}@github.com/Roshan0102/Jenkins-ARGOCD-Project-Manifest.git \
          /tmp/manifests-repo

      - name: Update Kubernetes Deployment File
        run: |

          cd /tmp/manifests-repo

          sed -i "s|image: roshan033/ultimate-cicd:.*|image: roshan033/ultimate-cicd:${{ github.run_number }}|g" \
          spring-boot-app-manifests/deployment.yml

      - name: Commit and Push Manifest Changes
        run: |

          cd /tmp/manifests-repo

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          git add spring-boot-app-manifests/deployment.yml

          git commit -m "Update deployment image to version ${{ github.run_number }}" || echo "No changes to commit"

          git push origin main
